<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Mark Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ═══════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════ */
:root {
  --crimson:    #7a0019;
  --crimson2:   #a80022;
  --crimson3:   #5c0012;
  --gold:       #c9a227;
  --gold2:      #e8ba30;
  --gold3:      #f5d97a;
  --gold-soft:  rgba(201,162,39,0.12);
  --gold-border:rgba(201,162,39,0.22);
  --bg:         #0c0905;
  --bg2:        #111009;
  --bg3:        #191410;
  --bg4:        #211b13;
  --bg5:        #2a2218;
  --border:     rgba(201,162,39,0.14);
  --border2:    rgba(255,255,255,0.06);
  --txt:        #f2e8d6;
  --txt2:       #b5a48a;
  --txt3:       #6e5e46;
  --ok:         #1db86a;
  --ok-bg:      rgba(29,184,106,0.1);
  --ok-border:  rgba(29,184,106,0.2);
  --warn:       #d4a017;
  --warn-bg:    rgba(212,160,23,0.1);
  --warn-border:rgba(212,160,23,0.2);
  --err:        #e53935;
  --err-bg:     rgba(229,57,53,0.1);
  --err-border: rgba(229,57,53,0.2);
  --blue:       #3b82f6;
  --blue-bg:    rgba(59,130,246,0.1);
  --sb-width:   268px;
  --sb-collapsed: 58px;
  --top-h:      58px;
  --radius:     12px;
  --radius-sm:  8px;
  --shadow:     0 2px 12px rgba(0,0,0,0.4);
  --shadow-lg:  0 6px 30px rgba(0,0,0,0.5);
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--txt);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
#sidebar {
  width: var(--sb-width);
  min-width: var(--sb-width);
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: relative;
  z-index: 200;
  transition: width 0.28s cubic-bezier(0.4,0,0.2,1),
              min-width 0.28s cubic-bezier(0.4,0,0.2,1),
              transform 0.28s cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
}

/* Desktop collapsed state */
body.sb-collapsed #sidebar {
  width: var(--sb-collapsed);
  min-width: var(--sb-collapsed);
}

/* Mobile: sidebar becomes drawer */
@media (max-width: 768px) {
  #sidebar {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    transform: translateX(100%);
    box-shadow: none;
    z-index: 300;
  }
  body.sb-open #sidebar {
    transform: translateX(0);
    box-shadow: var(--shadow-lg);
  }
}

/* Sidebar glow overlay */
#sidebar::before {
  content: '';
  position: absolute;
  top: 0; right: 0; left: 0;
  height: 180px;
  background: linear-gradient(180deg, rgba(122,0,25,0.18) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* ── Logo ── */
.sb-logo {
  padding: 16px 14px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 11px;
  flex-shrink: 0;
  min-height: var(--top-h);
  position: relative;
  z-index: 1;
}

.sb-logo-icon {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--crimson3), var(--crimson2));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  box-shadow: 0 3px 10px rgba(122,0,25,0.5);
}

.sb-logo-text {
  flex: 1;
  overflow: hidden;
  white-space: nowrap;
  transition: opacity 0.2s, width 0.28s;
}
.sb-logo-text h1 { font-size: 13.5px; font-weight: 900; color: var(--txt); }
.sb-logo-text span { font-size: 9.5px; color: var(--gold); font-weight: 600; }

body.sb-collapsed .sb-logo-text { opacity: 0; width: 0; overflow: hidden; }

.sb-toggle {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border2);
  color: var(--txt3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  transition: all 0.15s;
}
.sb-toggle:hover { background: rgba(255,255,255,0.1); color: var(--txt2); }

@media (max-width: 768px) { .sb-toggle { display: none; } }

/* ── Nav ── */
.sb-nav { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 8px 0; position: relative; z-index: 1; }
.sb-nav::-webkit-scrollbar { width: 2px; }
.sb-nav::-webkit-scrollbar-thumb { background: var(--border); }

.sb-label {
  font-size: 9px; font-weight: 800;
  color: var(--txt3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 10px 16px 4px;
  white-space: nowrap;
  overflow: hidden;
  transition: opacity 0.2s;
}
body.sb-collapsed .sb-label { opacity: 0; }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px;
  cursor: pointer;
  font-size: 12.5px; font-weight: 600;
  color: var(--txt3);
  border-right: 3px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
  user-select: none;
  position: relative;
  min-height: 40px;
}
.nav-item:hover { background: rgba(255,255,255,0.04); color: var(--txt2); }

.nav-item.active {
  color: var(--gold2);
  border-right-color: var(--gold2);
  background: var(--gold-soft);
}
.nav-item.app-active {
  color: var(--txt);
  border-right-color: var(--crimson2);
  background: rgba(122,0,25,0.14);
}

.ni-icon {
  width: 30px; height: 30px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  background: rgba(255,255,255,0.05);
  flex-shrink: 0;
  transition: background 0.15s;
}
.nav-item.active .ni-icon    { background: var(--gold-soft); }
.nav-item.app-active .ni-icon{ background: rgba(122,0,25,0.25); }

.ni-text { flex: 1; transition: opacity 0.2s; }
body.sb-collapsed .ni-text { opacity: 0; }

.ni-badge {
  font-size: 9px; font-weight: 800;
  padding: 2px 6px; border-radius: 6px;
  transition: opacity 0.2s;
  flex-shrink: 0;
}
body.sb-collapsed .ni-badge { opacity: 0; }
.ni-badge.ok   { background: var(--ok-bg);  color: var(--ok); }
.ni-badge.warn { background: var(--warn-bg); color: var(--warn); }
.ni-badge.err  { background: var(--err-bg);  color: var(--err); }

/* Tooltip on collapsed */
body.sb-collapsed .nav-item:hover::after {
  content: attr(data-tip);
  position: absolute;
  right: calc(var(--sb-collapsed) + 6px);
  top: 50%; transform: translateY(-50%);
  background: var(--bg5);
  border: 1px solid var(--border);
  color: var(--txt);
  font-size: 11.5px; font-weight: 600;
  padding: 5px 10px; border-radius: 7px;
  white-space: nowrap;
  z-index: 999;
  pointer-events: none;
}

.sb-divider {
  height: 1px;
  background: var(--border);
  margin: 6px 14px;
}

/* ── Agents in sidebar ── */
.sb-agents { padding: 0 10px 8px; }

.sa-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 8px;
  border-radius: 9px;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
  min-height: 44px;
}
.sa-item:hover { background: rgba(255,255,255,0.04); }
.sa-item.active { background: var(--gold-soft); border-color: var(--gold-border); }

.sa-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--crimson3), var(--crimson2));
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 900; color: #fff;
  flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(122,0,25,0.4);
}

.sa-body { flex: 1; min-width: 0; transition: opacity 0.2s; }
body.sb-collapsed .sa-body { opacity: 0; }
.sa-name { font-size: 11.5px; font-weight: 700; color: var(--txt); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sa-meta { font-size: 9.5px; color: var(--txt3); }

.sa-pct {
  font-size: 10px; font-weight: 800;
  padding: 2px 6px; border-radius: 5px;
  flex-shrink: 0;
  transition: opacity 0.2s;
}
body.sb-collapsed .sa-pct { opacity: 0; }
.sa-pct.ok   { color: var(--ok);  background: var(--ok-bg); }
.sa-pct.warn { color: var(--warn); background: var(--warn-bg); }
.sa-pct.err  { color: var(--err);  background: var(--err-bg); }

/* ── Sidebar bottom ── */
.sb-bottom {
  border-top: 1px solid var(--border);
  padding: 12px 14px;
  flex-shrink: 0;
  position: relative; z-index: 1;
}

.sb-status {
  display: flex; align-items: center; gap: 8px;
  font-size: 10px; color: var(--txt3);
  white-space: nowrap; overflow: hidden;
}

.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  flex-shrink: 0;
  transition: background 0.3s;
}
.status-dot.ok   { background: var(--ok);  box-shadow: 0 0 6px var(--ok);  animation: pulse-ok 2.5s ease-in-out infinite; }
.status-dot.fail { background: var(--err); box-shadow: 0 0 6px var(--err); }
.status-dot.loading { background: var(--warn); animation: pulse-warn 1s ease-in-out infinite; }

@keyframes pulse-ok   { 0%,100%{box-shadow:0 0 6px var(--ok)}   50%{box-shadow:0 0 14px rgba(29,184,106,0.5)} }
@keyframes pulse-warn { 0%,100%{opacity:1} 50%{opacity:0.4} }

.sb-status-text { transition: opacity 0.2s; }
body.sb-collapsed .sb-status-text { opacity: 0; }

/* ═══════════════════════════════════════
   MAIN AREA
═══════════════════════════════════════ */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

/* ── Topbar ── */
#topbar {
  height: var(--top-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 22px;
  gap: 14px;
  flex-shrink: 0;
  z-index: 100;
}

.hamburger {
  display: none;
  width: 34px; height: 34px;
  border-radius: 9px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border2);
  color: var(--txt2);
  cursor: pointer;
  align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  transition: all 0.15s;
}
.hamburger:hover { background: rgba(255,255,255,0.1); }
@media (max-width: 768px) { .hamburger { display: flex; } }

.tb-brand {
  display: flex; align-items: center; gap: 10px;
  flex: 1;
}

.tb-title {
  font-size: 15px; font-weight: 900; color: var(--txt);
}
.tb-title span { color: var(--gold2); }

.tb-sub {
  font-size: 10.5px; color: var(--txt3); font-weight: 600;
  padding: 3px 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border2);
  border-radius: 6px;
}

.tb-actions { display: flex; gap: 8px; align-items: center; }

.tb-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 11px; font-weight: 700;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: rgba(255,255,255,0.04);
  color: var(--txt2);
  font-family: 'Cairo', sans-serif;
  transition: all 0.15s;
  white-space: nowrap;
}
.tb-btn:hover { background: rgba(255,255,255,0.09); color: var(--txt); }
.tb-btn.gold {
  background: var(--gold-soft);
  border-color: var(--gold-border);
  color: var(--gold2);
}
.tb-btn.gold:hover { background: rgba(201,162,39,0.2); }

.tb-date {
  font-size: 10.5px; color: var(--txt3); font-weight: 600;
  padding: 5px 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  white-space: nowrap;
}

@media (max-width: 640px) { .tb-date { display: none; } .tb-sub { display: none; } }

/* ── Content area ── */
#content-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* ── Dashboard content (scrollable) ── */
#dashboard-view {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 22px 24px;
  display: none;
}
#dashboard-view::-webkit-scrollbar { width: 4px; }
#dashboard-view::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
#dashboard-view.active { display: block; }

/* ── App iframes ── */
.app-frame-wrap {
  position: absolute;
  inset: 0;
  display: none;
}
.app-frame-wrap.active { display: block; }

.app-frame-wrap iframe {
  width: 100%; height: 100%;
  border: none;
  background: #fff;
}

/* ── Overlay for mobile sidebar ── */
#sb-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 250;
  backdrop-filter: blur(2px);
}
@media (max-width: 768px) {
  body.sb-open #sb-overlay { display: block; }
}

/* ═══════════════════════════════════════
   DASHBOARD COMPONENTS
═══════════════════════════════════════ */

/* Animations */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
.au { animation: fadeUp 0.35s ease both; }
.au-1 { animation-delay: 0.04s; }
.au-2 { animation-delay: 0.08s; }
.au-3 { animation-delay: 0.12s; }
.au-4 { animation-delay: 0.16s; }
.au-5 { animation-delay: 0.20s; }
.au-6 { animation-delay: 0.24s; }

/* Loading spinner */
.spinner-wrap {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 60vh;
  gap: 16px;
}
.spinner {
  width: 44px; height: 44px;
  border: 3px solid var(--border);
  border-top-color: var(--gold2);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.spinner-txt { font-size: 12px; color: var(--txt3); }

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 50vh; text-align: center; gap: 10px;
}
.empty-icon { font-size: 44px; opacity: 0.4; }
.empty-txt  { font-size: 13px; color: var(--txt3); }

/* Section header */
.sec-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.sec-title {
  font-size: 14px; font-weight: 900; color: var(--txt);
  display: flex; align-items: center; gap: 8px;
}
.sec-sub { font-size: 10.5px; color: var(--txt3); }

/* KPI Grid */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
@media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px) { .kpi-grid { grid-template-columns: 1fr; } }

.kpi-card {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 16px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
  cursor: default;
}
.kpi-card:hover { border-color: var(--border); transform: translateY(-1px); }

.kpi-card::after {
  content: '';
  position: absolute;
  bottom: 0; right: 0; left: 0; height: 3px;
}
.kpi-card.kc-ok::after    { background: var(--ok); }
.kpi-card.kc-warn::after  { background: var(--warn); }
.kpi-card.kc-err::after   { background: var(--err); }
.kpi-card.kc-gold::after  { background: var(--gold); }
.kpi-card.kc-blue::after  { background: var(--blue); }

.kpi-icon {
  font-size: 18px;
  width: 36px; height: 36px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 12px;
}
.kpi-card.kc-ok   .kpi-icon { background: var(--ok-bg); }
.kpi-card.kc-warn .kpi-icon { background: var(--warn-bg); }
.kpi-card.kc-err  .kpi-icon { background: var(--err-bg); }
.kpi-card.kc-gold .kpi-icon { background: var(--gold-soft); }
.kpi-card.kc-blue .kpi-icon { background: var(--blue-bg); }

.kpi-val { font-size: 24px; font-weight: 900; color: var(--txt); line-height: 1; }
.kpi-lbl { font-size: 10px; color: var(--txt3); margin-top: 4px; font-weight: 700; }

.kpi-badge {
  position: absolute; top: 12px; left: 12px;
  font-size: 9px; font-weight: 800;
  padding: 2px 6px; border-radius: 5px;
}
.kpi-card.kc-ok   .kpi-badge { color: var(--ok);  background: var(--ok-bg); }
.kpi-card.kc-warn .kpi-badge { color: var(--warn); background: var(--warn-bg); }
.kpi-card.kc-err  .kpi-badge { color: var(--err);  background: var(--err-bg); }
.kpi-card.kc-gold .kpi-badge { color: var(--gold); background: var(--gold-soft); }
.kpi-card.kc-blue .kpi-badge { color: var(--blue); background: var(--blue-bg); }

/* Agents overview grid */
.agents-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}

.agent-overview-card {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
  overflow: hidden;
}
.agent-overview-card:hover {
  border-color: var(--gold-border);
  background: var(--bg4);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.aoc-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }

.aoc-avatar {
  width: 42px; height: 42px;
  border-radius: 11px;
  background: linear-gradient(135deg, var(--crimson3), var(--crimson2));
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 900; color: #fff;
  flex-shrink: 0;
  box-shadow: 0 3px 10px rgba(122,0,25,0.4);
}

.aoc-info { flex: 1; }
.aoc-name { font-size: 13.5px; font-weight: 800; color: var(--txt); }
.aoc-meta { font-size: 10px; color: var(--txt3); margin-top: 2px; }

.aoc-pct {
  font-size: 18px; font-weight: 900;
}
.aoc-pct.ok   { color: var(--ok); }
.aoc-pct.warn { color: var(--warn); }
.aoc-pct.err  { color: var(--err); }

.aoc-bar-wrap {
  height: 5px; background: var(--bg5);
  border-radius: 3px; overflow: hidden;
  margin-bottom: 12px;
}
.aoc-bar { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
.aoc-bar.ok   { background: var(--ok); }
.aoc-bar.warn { background: var(--warn); }
.aoc-bar.err  { background: var(--err); }

.aoc-stats {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.aoc-stat {
  background: var(--bg5);
  border-radius: 7px;
  padding: 7px 10px;
  text-align: center;
}
.aoc-stat-val { font-size: 13px; font-weight: 800; color: var(--txt); }
.aoc-stat-lbl { font-size: 9px; color: var(--txt3); }

.aoc-source-tag {
  position: absolute; top: 10px; left: 10px;
  font-size: 8.5px; font-weight: 800;
  padding: 2px 6px; border-radius: 4px;
  opacity: 0.7;
}
.src-t  { background: rgba(122,0,25,0.3);    color: #e07070; }
.src-m  { background: rgba(201,162,39,0.15); color: var(--gold); }
.src-tm { background: rgba(59,130,246,0.15); color: #93c5fd; }

/* ═══════════════════════════════════════
   AGENT PROFILE
═══════════════════════════════════════ */
.agent-profile-hdr {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 20px 22px;
  display: flex; align-items: center; gap: 18px;
  margin-bottom: 18px;
  position: relative;
  overflow: hidden;
}
.agent-profile-hdr::before {
  content: '';
  position: absolute;
  top: 0; right: 0; width: 180px; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(122,0,25,0.1));
  pointer-events: none;
}

.ap-avatar {
  width: 56px; height: 56px;

<!-- ════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════ -->
<script>
/* ══════════════════════════════════
   CONFIG
══════════════════════════════════ */
const SB_URL = 'https://jlxbcaxruvhpmrkaslqk.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpseGJjYXhydXZocG1ya2FzbHFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2Mzg0NzQsImV4cCI6MjA4OTIxNDQ3NH0.MqU6lC7QsJb52BlLd99FVoz9qwysikAWMzUGs0r77nA';

// IndexedDB constants (from monitoring app)
const DB_NAME  = 'gmReps7';
const DB_STORE = 'reps';

// App paths (relative to this index.html)
const APP1_PATH = 'monthly-target/index.html';
const APP2_PATH = 'monitoring/index.html';

/* ══════════════════════════════════
   STATE
══════════════════════════════════ */
let _agents      = [];
let _tiers       = [];
let _targets     = [];
let _sales       = [];
let _monReps     = {};   // name-key → rep object from IndexedDB
let _currentView = 'home';
let _currentAgent = null;
let _sbCollapsed = false;
let _currentMonth = getMonthKey();

/* ══════════════════════════════════
   DATE HELPERS
══════════════════════════════════ */
function getMonthKey(offset = 0) {
  const d = new Date();
  d.setMonth(d.getMonth() + offset);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function monthLabelAr(key) {
  const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو',
                  'يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const [y, m] = key.split('-');
  return `${months[+m-1]} ${y}`;
}

function todayAr() {
  const days  = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const months= ['يناير','فبراير','مارس','أبريل','مايو','يونيو',
                 'يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const d = new Date();
  return `${days[d.getDay()]}، ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function monthProgress() {
  const d   = new Date();
  const dim = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
  return { day: d.getDate(), total: dim, left: dim - d.getDate(), pct: Math.round(d.getDate()/dim*100) };
}

function fmt(n, dec=2) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return (+n).toLocaleString('ar-EG', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function norm(s) {
  return String(s||'').trim()
    .replace(/\s+/g,' ')
    .replace(/[أإآا]/g,'ا')
    .replace(/ة/g,'ه')
    .replace(/ى/g,'ي')
    .toLowerCase();
}

/* ══════════════════════════════════
   SUPABASE API
══════════════════════════════════ */
const HDR = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };

async function sbGet(table, q='') {
  const r = await fetch(`${SB_URL}/rest/v1/${table}${q}`, { headers: HDR });
  if (!r.ok) throw new Error(`${table}: ${r.status}`);
  return r.json();
}

/* ══════════════════════════════════
   INDEXEDDB — MONITORING REPS
══════════════════════════════════ */
function loadMonitoringReps() {
  return new Promise(resolve => {
    try {
      const req = indexedDB.open(DB_NAME, 1);
      req.onsuccess = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(DB_STORE)) { resolve({}); return; }
        const tx  = db.transaction(DB_STORE, 'readonly');
        const req2 = tx.objectStore(DB_STORE).getAll();
        req2.onsuccess = ev => {
          const map = {};
          (ev.target.result || []).forEach(r => {
            map[norm(r.name)] = r;
          });
          resolve(map);
        };
        req2.onerror = () => resolve({});
      };
      req.onerror = () => resolve({});
      req.onblocked = () => resolve({});
    } catch(e) { resolve({}); }
  });
}

/* ══════════════════════════════════
   PERFORMANCE CALC (mirrors calcAgent)
══════════════════════════════════ */
function calcAgent(agentId, month) {
  const mT = _targets.filter(t => t.agent_id === agentId && t.month === month);
  const mS = _sales.filter(s => s.agent_id === agentId && s.month === month);

  const tierSales = {};
  for (const s of mS) {
    const tm = _tiers.find(t => norm(String(t.item_code)) === norm(String(s.item_code)));
    if (tm) tierSales[tm.tier_name] = (tierSales[tm.tier_name]||0) + parseFloat(s.achieved_value||0);
  }

  let totTarget=0, totAchieved=0;
  const tierData = mT.map(t => {
    const ach = tierSales[t.tier_name]||0;
    const pct = t.target_value > 0 ? (ach/t.target_value)*100 : 0;
    totTarget   += parseFloat(t.target_value||0);
    totAchieved += ach;
    const req = parseFloat(t.required_pct||75);
    return {
      name: t.tier_name,
      target: parseFloat(t.target_value||0),
      achieved: ach,
      pct: Math.round(pct*10)/10,
      req,
      status: pct >= req ? 'ok' : pct >= req*0.75 ? 'wa' : 'er'
    };
  });

  const overallPct = totTarget > 0 ? Math.round((totAchieved/totTarget)*100) : 0;
  const avgReq     = mT.length ? mT.reduce((s,t) => s+parseFloat(t.required_pct||75),0)/mT.length : 75;
  const status     = overallPct >= avgReq ? 'ok' : overallPct >= avgReq*0.75 ? 'wa' : 'er';

  return { tierData, totTarget, totAchieved, overallPct, status, hasData: mT.length > 0 };
}

function statusCls(s) { return s==='ok'?'ok':s==='wa'?'warn':'err'; }

/* ══════════════════════════════════
   INIT & REFRESH
══════════════════════════════════ */
async function init() {
  setStatus('loading', 'جاري الاتصال...');
  setDate();

  // Load monitoring reps (local — never fails)
  try { _monReps = await loadMonitoringReps(); } catch(e) { _monReps = {}; }

  // Load Supabase data
  try {
    const month = _currentMonth;
    const [agents, tiers, targets, sales] = await Promise.all([
      sbGet('agents','?active=eq.true&order=name'),
      sbGet('tiers',''),
      sbGet('targets',`?month=eq.${month}`),
      sbGet('sales',  `?month=eq.${month}`)
    ]);
    _agents  = Array.isArray(agents)  ? agents  : [];
    _tiers   = Array.isArray(tiers)   ? tiers   : [];
    _targets = Array.isArray(targets) ? targets : [];
    _sales   = Array.isArray(sales)   ? sales   : [];
    setStatus('ok', 'متصل بـ Supabase');
  } catch(e) {
    _agents = []; _tiers = []; _targets = []; _sales = [];
    setStatus('fail', 'تعذّر الاتصال — تحقق من الشبكة');
    console.error('Supabase error:', e);
  }

  // Always render — regardless of Supabase result
  try { renderSidebarAgents(); } catch(e) { console.error('sidebar error:', e); }
  try { renderCurrentView();   } catch(e) {
    console.error('render error:', e);
    document.getElementById('dashboard-view').innerHTML =
      `<div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-txt">خطأ في التحميل — ${e.message}</div>
        <button onclick="init()" style="margin-top:14px;padding:9px 20px;border-radius:9px;
          background:var(--gold-soft);border:1px solid var(--gold-border);color:var(--gold2);
          font-size:12px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif;">

async function refreshAll() {
  setStatus('loading', 'جاري التحديث...');
  try {
    const month = _currentMonth;
    const [agents, tiers, targets, sales] = await Promise.all([
      sbGet('agents','?active=eq.true&order=name'),
      sbGet('tiers',''),
      sbGet('targets',`?month=eq.${month}`),
      sbGet('sales',  `?month=eq.${month}`)
    ]);
    _agents  = Array.isArray(agents)  ? agents  : [];
    _tiers   = Array.isArray(tiers)   ? tiers   : [];
    _targets = Array.isArray(targets) ? targets : [];
    _sales   = Array.isArray(sales)   ? sales   : [];
    try { _monReps = await loadMonitoringReps(); } catch(e) { _monReps = {}; }
    setStatus('ok', 'متصل بـ Supabase');
    toast('تم التحديث', 'ok');
  } catch(e) {
    setStatus('fail', 'فشل التحديث');
    toast('فشل التحديث — ' + e.message, 'fail');
    console.error('refresh error:', e);
  }
  try { renderSidebarAgents(); } catch(e) { console.error(e); }
  try { renderCurrentView();   } catch(e) { console.error(e); }
}

function renderSidebarAgents() {
  const wrap = document.getElementById('sb-agents-list');
  if (!_agents.length) {
    wrap.innerHTML = `<div style="padding:12px 8px;font-size:11px;color:var(--txt3);text-align:center">لا توجد بيانات</div>`;

  }
  wrap.innerHTML = _agents.map(a => {

    const cls  = statusCls(calc.status);

/* ══════════════════════════════════
   VIEW ROUTING
══════════════════════════════════ */
function setNavActive(id) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.remove('active','app-active');
  });
  const el = document.getElementById(id);
  if (el) el.classList.add(id==='nav-home' ? 'active' : 'app-active');
}

function showView(v) {
  // Reset agent selection if going to home
  if (v === 'home') _currentAgent = null;

  _currentView = v;

  // Hide all views
  document.getElementById('dashboard-view').classList.remove('active');
  document.getElementById('frame-app1').classList.remove('active');
  document.getElementById('frame-app2').classList.remove('active');

  if (v === 'home') {
    setNavActive('nav-home');
    setTitle('لوحة', 'المدير');
    document.getElementById('dashboard-view').classList.add('active');
    renderHome();
    closeSidebar();
  } else if (v === 'app1') {
    setNavActive('nav-app1');
    setTitle('تطبيق', 'الهدف الشهري');
    const frame = document.getElementById('frame-app1');
    frame.classList.add('active');
    if (!document.getElementById('iframe-app1').src) {
      document.getElementById('iframe-app1').src = APP1_PATH;
    }
    closeSidebar();
  } else if (v === 'app2') {
    setNavActive('nav-app2');
    setTitle('تطبيق', 'مراقبة المناديب');
    const frame = document.getElementById('frame-app2');
    frame.classList.add('active');
    if (!document.getElementById('iframe-app2').src) {
      document.getElementById('iframe-app2').src = APP2_PATH;
    }
    closeSidebar();
  }

  // Update sidebar agents highlight
  document.querySelectorAll('.sa-item').forEach(el => el.classList.remove('active'));
}

function showAgentProfile(agent) {
  _currentAgent = agent;
  _currentView  = 'agent';

  // Clear app nav active
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active','app-active'));

  // Highlight sidebar agent
  document.querySelectorAll('.sa-item').forEach(el => el.classList.remove('active'));
  const saEl = document.getElementById(`sa-${agent.id}`);
  if (saEl) saEl.classList.add('active');

  setTitle('ملف', agent.name);

  document.getElementById('frame-app1').classList.remove('active');
  document.getElementById('frame-app2').classList.remove('active');
  document.getElementById('dashboard-view').classList.add('active');

  renderAgentProfile(agent);
  closeSidebar();
}

function renderCurrentView() {
  if (_currentView === 'home')  renderHome();
  if (_currentView === 'agent' && _currentAgent) renderAgentProfile(_currentAgent);
}

function setTitle(plain, highlight) {
  document.getElementById('tb-title').innerHTML = `${plain} <span>${highlight}</span>`;

            const badgeBg = t.status==='ok'?'var(--ok-bg)':t.status==='wa'?'var(--warn-bg)':'var(--err-bg)';
            return `<tr style="border-top:1px solid var(--border2)">
              <td style="padding:9px 14px;color:var(--txt);font-weight:600">${t.name}</td>
              <td style="padding:9px 14px;text-align:center;color:var(--txt2)">${fmt(t.target)}</td>
              <td style="padding:9px 14px;text-align:center;color:var(--txt2)">${fmt(t.achieved)}</td>
              <td style="padding:9px 14px;text-align:center;color:${diff>=0?'var(--ok)':'var(--err)'}">
                ${diff>=0?'+':''}${fmt(diff)}
              </td>
              <td style="padding:9px 14px;text-align:center;font-weight:800;color:${c}">${t.pct}%</td>
              <td style="padding:9px 14px;text-align:center">
                <span style="font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;background:${badgeBg};color:${c}">
                  ${badge}
                </span>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot>
          <tr style="background:var(--bg4);border-top:1px solid var(--border)">
            <td style="padding:9px 14px;font-weight:900;color:var(--txt)">الإجمالي</td>
            <td style="padding:9px 14px;text-align:center;font-weight:800;color:var(--txt)">${fmt(calc.totTarget)}</td>
            <td style="padding:9px 14px;text-align:center;font-weight:800;color:var(--txt)">${fmt(calc.totAchieved)}</td>
            <td style="padding:9px 14px;text-align:center;font-weight:800;color:${calc.totAchieved-calc.totTarget>=0?'var(--ok)':'var(--err)'}">
              ${calc.totAchieved-calc.totTarget>=0?'+':''}${fmt(calc.totAchieved-calc.totTarget)}
            </td>
            <td style="padding:9px 14px;text-align:center;font-weight:900;font-size:14px;color:${scoreColor}">${pct}%</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>` : ''}

  <!-- Back button -->
  <div class="au-4" style="margin-top:6px">
    <button onclick="showView('home')" style="
      padding:9px 20px;border-radius:9px;
      background:transparent;border:1px solid var(--border2);
      color:var(--txt3);font-size:11.5px;font-weight:700;
      cursor:pointer;font-family:Cairo,sans-serif;
      transition:all 0.15s;
    " onmouseover="this.style.borderColor='var(--border)';this.style.color='var(--txt2)'"
       onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--txt3)'">
      ← العودة للوحة المدير
    </button>
  </div>`;
}

/* ══════════════════════════════════
   EXPORT — Agent Excel
══════════════════════════════════ */
function exportAgentExcel(agentName, agentId) {
  const calc = calcAgent(agentId, _currentMonth);
  if (!calc.hasData) { toast('لا توجد بيانات لهذا المندوب', 'warn'); return; }

  const monthLbl = monthLabelAr(_currentMonth);
  const wb = XLSX.utils.book_new();

  // ── Sheet 1: ملخص الشرائح ──
  const rows = [];
  rows.push(['المندوب', agentName]);
  rows.push(['الشهر', monthLbl]);
  rows.push([]);
  rows.push(['الشريحة', 'المستهدف (د.أ)', 'الفعلي (د.أ)', 'الفارق (د.أ)', 'النسبة %', 'الحالة']);

  calc.tierData.forEach(t => {
    const diff = t.achieved - t.target;
    const status = t.status==='ok' ? 'محقق' : t.status==='wa' ? 'قريب' : 'متأخر';
    rows.push([t.name, t.target, t.achieved, diff, t.pct + '%', status]);
  });

  rows.push([]);
  rows.push(['الإجمالي', calc.totTarget, calc.totAchieved,
             calc.totAchieved - calc.totTarget,
             calc.overallPct + '%', '']);

  const ws = XLSX.utils.aoa_to_sheet(rows);

  // Column widths
  ws['!cols'] = [
    {wch:30}, {wch:16}, {wch:16}, {wch:16}, {wch:12}, {wch:12}
  ];

  XLSX.utils.book_append_sheet(wb, ws, 'أداء الشرائح');
  XLSX.writeFile(wb, `أداء_${agentName}_${_currentMonth}.xlsx`);
  toast(`تم تصدير ملف ${agentName}`, 'ok');
}

/* ══════════════════════════════════
   TOAST
══════════════════════════════════ */
function toast(msg, type='ok') {
  const wrap = document.getElementById('toast-wrap');
  const icons = { ok:'✅', warn:'⚠️', fail:'❌' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]||'ℹ️'}</span> ${msg}`;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
